<!DOCTYPE html>
<html lang="en" ng-app="loginApp">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<style>

/* ===== BACKGROUND ===== */
body {
  height: 100vh;
  margin: 0;
  font-family: "Inter", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at 20% 20%, rgba(79,70,229,0.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(249,115,22,0.12), transparent 40%),
    #0f172a;
}

/* ===== CARD ===== */
.login-card {
  width: 100%;
  max-width: 380px;
  padding: 35px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* ===== TITLE ===== */
.login-title {
  text-align: center;
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 25px;
}

/* ===== INPUT ===== */
.form-control {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
}

.form-control:focus {
  border-color: #4f46e5;
  box-shadow: 0 0 0 2px rgba(79,70,229,0.3);
  background: transparent;
  color: white;
}

.form-floating label {
  color: #cbd5f5;
}

/* ===== PASSWORD ICON ===== */
.password-wrapper {
  position: relative;
}

.toggle-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* ===== BUTTON ===== */
.btn-login {
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  border: none;
  border-radius: 999px;
  padding: 10px;
  font-weight: 700;
  color: white;
  transition: 0.3s;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(79,70,229,0.5);
}

/* ===== BLOCK PROGRESS ===== */
.block-loader {
  display: flex;
  gap: 6px;
  margin-top: 15px;
}

.block {
  flex: 1;
  height: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.15);
  overflow: hidden;
  position: relative;
}

.block.active {
  background: linear-gradient(90deg, #4f46e5, #6366f1);
  box-shadow: 0 0 10px rgba(99,102,241,0.8);
}

/* ===== ERROR ===== */
.error-msg {
  margin-top: 12px;
  text-align: center;
  color: #fca5a5;
}

/* ===== LOADER TEXT ===== */
.loading-text {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
  color: #cbd5f5;
}
/* ===== PRELOADER OVERLAY ===== */
.preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* BOX */
.loader-box {
  text-align: center;
  width: 260px;
}

/* ===== SPINNER ===== */
.spinner {
  width: 60px;
  height: 60px;
  border: 5px solid rgba(255,255,255,0.1);
  border-top: 5px solid #4f46e5;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* ===== PROGRESS ===== */
.progress {
  height: 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.15);
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #4f46e5, #6366f1);
  transition: width 0.3s ease;
}

/* TEXT */
.loading-text {
  margin-top: 12px;
  font-size: 14px;
  color: #cbd5f5;
}
</style>
</head>

<body ng-controller="loginCtrl">

<div class="login-card">

<div class="login-title">
  <i class="fa-solid fa-user-shield"></i> Admin Login
</div>

<form ng-submit="login()">

<div class="form-floating mb-3">
  <input type="text" class="form-control" ng-model="user.username" placeholder="Username" required>
  <label>Username</label>
</div>

<div class="form-floating mb-3 password-wrapper">
  <input type="{{showPassword ? 'text':'password'}}" class="form-control" ng-model="user.password" placeholder="Password" required>
  <label>Password</label>

  <i class="fa-solid toggle-eye"
     ng-class="showPassword ? 'fa-eye-slash':'fa-eye'"
     ng-click="togglePassword()"></i>
</div>

<button class="btn btn-login w-100" ng-disabled="loading">
  {{loading ? "Logging in..." : "Login"}}
</button>

<div class="loading-text" ng-if="loading">
  Authenticating...
</div>

<div class="error-msg" ng-if="error">
  Invalid credentials
</div>

</form>
</div>
<!-- PRELOADER -->
<div class="preloader" ng-show="loading">
  <div class="loader-box">

    <!-- Circle Spinner -->
    <div class="spinner"></div>

    <!-- Progress Bar -->
    <div class="progress mt-4">
      <div class="progress-bar"
           ng-style="{'width': progress + '%'}">
      </div>
    </div>

    <p class="loading-text">Authenticating... {{progress | number:0}}%</p>

  </div>
</div>

<script>
var app = angular.module("loginApp", []);

app.controller("loginCtrl", function ($scope, $http) {

  $scope.user = {};
  $scope.showPassword = false; // ✅ important
  $scope.loading = false;
  $scope.progress = 0;

  // ✅ FIXED toggle
  $scope.togglePassword = function () {
    $scope.showPassword = !$scope.showPassword;
  };

  $scope.login = function () {

    $scope.loading = true;
    $scope.error = false;
    $scope.progress = 0;

    let interval = setInterval(() => {
      $scope.$apply(() => {
        if ($scope.progress < 95) {
          $scope.progress += Math.random() * 7;
        }
      });
    }, 200);

    $http.post("/admin-login", $scope.user)
      .then(function (res) {

        clearInterval(interval);

        if (res.data.success) {

          $scope.progress = 100;

          setTimeout(() => {
            localStorage.setItem("admin", "true");
            window.location.href = "admin.html";
          }, 600);

        } else {
          $scope.loading = false;
          $scope.error = true;
          $scope.progress = 0;
        }

      })
      .catch(function () {
        clearInterval(interval);
        $scope.loading = false;
        $scope.error = true;
        $scope.progress = 0;
      });
  };

});
</script>

</body>
</html>
